services:

  db:
    image: mysql:8
    environment:
     MYSQL_DATABASE: ${MYSQL_DATABASE}
  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pAarif@7277"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: maven:3.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ./backend:/app
      - m2_cache:/root/.m2

    environment:
      SPRING_PROFILES_ACTIVE: dev

      DB_URL: jdbc:mysql://db:3306/task_manager
      DB_USERNAME: root
      DB_PASSWORD: Aarif@7277

      JWT_SECRET: mySecretKey123456789
      JWT_EXPIRATION: 86400000

      CORS_ALLOWED_ORIGINS: http://localhost:5173

    ports:
      - "8080:8080"

    depends_on:
      db:
        condition: service_healthy

    command: ./mvnw spring-boot:run -DskipTests

  frontend:
    image: node:20-alpine
    working_dir: /app

    volumes:
      - ./frontend:/app
      - node_modules_cache:/app/node_modules

    environment:
      VITE_API_BASE: /api
      VITE_PROXY_TARGET: http://backend:8080

    ports:
      - "5173:5173"

    depends_on:
      - backend

    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  mysql_data:
  m2_cache:
  node_modules_cache:
