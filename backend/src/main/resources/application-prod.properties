# Production profile: set strict, env-driven configuration

# Database (no defaults in prod)
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager
spring.datasource.username=root
spring.datasource.password=Aarif@7277
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT (no default secret in prod)
jwt.secret=mySecretKey123456789
jwt.expiration=86400000

# Flyway
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration/active
spring.jpa.hibernate.ddl-auto=update

# CORS allowlist (comma-separated). Example: https://myapp.com,https://www.myapp.com
app.cors.allowed-origins=http://localhost:5173

# Reduce noisy logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.com.taskmanager.api=INFO
logging.level.org.springframework.security=INFO

# Disable Swagger/OpenAPI in production by default
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
