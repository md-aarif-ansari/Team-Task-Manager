spring.application.name=TaskManager API

# Server Configuration
server.port=8080

# Database Configuration
# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager
spring.datasource.username=root
spring.datasource.password=Aarif@7277
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# Flyway
spring.flyway.enabled=false
# Use the isolated active migrations folder to avoid duplicate-version conflicts
spring.flyway.locations=classpath:db/migration/active

# JPA/Hibernate Configuration

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# CORS (comma-separated). In production, override via env (see application-prod.properties).
app.cors.allowed-origins=http://localhost:5173

# JWT Configuration
jwt.secret=mySecretKey123456789
jwt.expiration=86400000

# Logging
logging.level.com.taskmanager.api=INFO
logging.level.org.springframework.security=INFO
